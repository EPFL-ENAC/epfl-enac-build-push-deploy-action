---
name: deploy

on:
  workflow_call:
    inputs:
      argo_repository:
        required: false
        type: string
        default: '["EPFL-ENAC/enack8s-app-config"]'
        description: "JSON array of argo repos (legacy, used when registries is not set)"
      org:
        required: true
        type: string
      repo:
        required: true
        type: string
      lfs:
        # perform git lfs pull at checkout time
        required: false
        type: boolean
        default: false
      submodules:
        # whether to checkout submodules
        # `true` to checkout submodules or `recursive` to recursively checkout submodules
        required: false
        type: string
        default: false
      build_args:
        required: false
        type: string
        default: ""
        description: |
          Additional Docker build-args, one KEY=VALUE per line. Appended to the
          built-in SSH_PRIVATE_KEY arg. Useful for passing GIT_SHA, version
          tags, etc. into the build. Unconsumed args are harmless (Docker just
          warns).
      build_context:
        required: false
        type: string
        default: '["./"]'
      image_name: # work only for "./" build context, to override default's default
        required: false
        type: string
        default: ""
      create_pull_request:
        required: false
        type: boolean
        default: false
      registries:
        required: false
        type: string
        default: ""
        description: |
          JSON array of registry configs for multi-registry push.
          Each entry: {"registry":"ghcr.io","registry_path":"","registry_username":"","argo_repositories":["EPFL-ENAC/enack8s-app-config"]}
          First non-ghcr registry uses registry_token secret, second uses registry_token_2.
          If empty, falls back to single registry/registry_path/registry_username inputs.
      registry:
        required: false
        type: string
        default: "ghcr.io"
      registry_path:
        required: false
        type: string
        default: ""
      registry_username:
        required: false
        type: string
        default: "${{ github.actor }}"
      helm_chart_name:
        required: false
        type: string
        default: ""
      helm_chart_version:
        required: false
        type: string
        default: ""
      skip_vulnerability_scan:
        required: false
        type: boolean
        default: true
    secrets:
      token:
        required: true
      private_key:
        required: false
      registry_token:
        required: false
      registry_token_2:
        required: false

env:
  CD_ORG: ${{ inputs.org }}
  CD_REPO: ${{ inputs.repo }}
  IMAGE_NAME: ${{ inputs.image_name }}
  CREATE_PULL_REQUEST: ${{ inputs.create_pull_request }}

# Architecture: build once → push to ghcr → crane-copy the same digest to other registries → update N manifest repos
# ghcr.io is always the source of truth; other registries receive byte-identical copies (same digest).
# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
      push_matrix: ${{ steps.set-matrix.outputs.push_matrix }}
      manifest_matrix: ${{ steps.set-matrix.outputs.manifest_matrix }}
    steps:
      - name: lowercase repo owner
        run: |
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV};

      - name: Set image name
        shell: bash
        run: |
          IMAGE_NAME=$( if [ -n "${{ env.IMAGE_NAME }}" ]; then echo "${{ env.IMAGE_NAME }}"; else echo "${{ env.CD_REPO }}"; fi );
          echo $IMAGE_NAME;
          echo "IMAGE_NAME=\"$IMAGE_NAME\"" >> ${GITHUB_ENV};

      - name: Build matrices
        id: set-matrix
        shell: bash
        run: |
          # --- Determine registries configuration ---
          registries_input='${{ inputs.registries }}'
          if [ -z "$registries_input" ]; then
            # Fallback: build from legacy single-registry inputs
            registries_json='[{"registry":"${{ inputs.registry }}","registry_path":"${{ inputs.registry_path }}","registry_username":"${{ inputs.registry_username }}","argo_repositories":${{ inputs.argo_repository }}}]'
          else
            registries_json="$registries_input"
          fi
          echo "Registries: $registries_json"

          # --- Build matrix (builds and pushes to ghcr, the source of truth) ---
          owner="${{ env.OWNER }}"
          org="${{ env.CD_ORG }}"
          repo="${{ env.CD_REPO }}"
          input_json=${{ toJson(inputs.build_context) }};
          echo "Build contexts: $input_json";
          build_matrix=$(echo "$input_json" | jq -c \
            --arg owner "$owner" \
            --arg org "$org" \
            --arg repo "$repo" \
            'to_entries | map(
            (.value | rtrimstr("/")) as $ctx
            | ($ctx == "." or $ctx == "./") as $root
            | ($ctx | split("/") | .[-1]) as $leaf
            | {
                dockerfile: (if $root then "./Dockerfile" else ($ctx + "/Dockerfile") end),
                context: (if $root then "." else $ctx end),
                name: (if $root then (${{ env.IMAGE_NAME }}) else $leaf end),
                id: (.key + 1)
              }
            | . + {
                ghcr_image: (if .context == "." then
                    ("ghcr.io/" + $owner + "/" + $org + "/" + .name)
                  else
                    ("ghcr.io/" + $owner + "/" + $org + "/" + $repo + "/" + .name)
                  end)
              }
          )')
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $build_matrix"

          # --- Push matrix (cross-product: build contexts × registries) ---
          push_matrix=$(echo "$registries_json" | jq -c \
            --argjson builds "$build_matrix" \
            --arg owner "$owner" \
            --arg org "$org" \
            --arg repo "$repo" \
            '
            # Compute sequential index among non-ghcr registries
            [to_entries[] | select(.value.registry != "ghcr.io")] as $non_ghcr |
            [
              to_entries[] | .key as $ri | .value as $reg |
              (if $reg.registry == "ghcr.io" then 0
               else ([$non_ghcr | to_entries[] | select(.value.key == $ri)][0].key + 1)
               end) as $non_ghcr_idx |
              $builds[] |
              {
                name: .name,
                build_id: .id,
                registry: $reg.registry,
                registry_path: ($reg.registry_path // ""),
                registry_username: ($reg.registry_username // ""),
                non_ghcr_index: $non_ghcr_idx,
                source_image: .ghcr_image,
                image: (
                  if $reg.registry == "ghcr.io" then
                    .ghcr_image
                  else
                    if (($reg.registry_path // "") | length) > 0 then
                      ($reg.registry + "/" + $reg.registry_path + "/" + .name)
                    else
                      ($reg.registry + "/" + .name)
                    end
                  end
                ),
                push_id: ("r" + ($ri + 1 | tostring) + "_c" + (.id | tostring))
              }
            ]')
          echo "push_matrix=$push_matrix" >> "$GITHUB_OUTPUT"
          echo "Push matrix: $push_matrix"

          # --- Manifest matrix (argo repos with their associated registry) ---
          manifest_matrix=$(echo "$registries_json" | jq -c '[
            to_entries[] | .value as $reg |
            ($reg.argo_repositories // [])[] |
            {
              argo_repository: .,
              registry: $reg.registry
            }
          ]')
          echo "manifest_matrix=$manifest_matrix" >> "$GITHUB_OUTPUT"
          echo "Manifest matrix: $manifest_matrix"

      - name: Echo matrices
        shell: bash
        run: |
          echo "Build: ${{ steps.set-matrix.outputs.build_matrix }}"
          echo "Push: ${{ steps.set-matrix.outputs.push_matrix }}"
          echo "Manifest: ${{ steps.set-matrix.outputs.manifest_matrix }}"

  build:
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.build_matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.lfs }}
          submodules: ${{ inputs.submodules }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.ghcr_image }}:${{ github.sha }}
          build-args: |
            SSH_PRIVATE_KEY=${{ secrets.private_key }}
            ${{ inputs.build_args }}
          cache-from: type=gha,scope=build-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.name }}

      - name: Install Trivy (pinned)
        if: inputs.skip_vulnerability_scan == false
        run: |
          # Version-pinned with a hardcoded checksum: installing from a live
          # apt repo or action would run whatever it serves that day as root.
          TRIVY_VERSION=0.72.0
          TRIVY_SHA256=9bf8aba92f524b74f8e83d53b298a7dfc6b4d60aca779217e7817e5433c73eeb
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb"
          echo "${TRIVY_SHA256}  trivy_${TRIVY_VERSION}_Linux-64bit.deb" | sha256sum -c
          sudo dpkg -i "trivy_${TRIVY_VERSION}_Linux-64bit.deb"

      - name: Scan image with Trivy
        if: inputs.skip_vulnerability_scan == false
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "${{ matrix.ghcr_image }}:${{ github.sha }}"

  push:
    runs-on: ubuntu-latest
    needs: [define-matrix, build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.push_matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        # always: ghcr is the copy source for every registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom registry (1st)
        if: matrix.registry != 'ghcr.io' && matrix.non_ghcr_index == 1
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry }}
          username: ${{ matrix.registry_username || github.actor }}
          password: ${{ secrets.registry_token }}

      - name: Login to custom registry (2nd)
        if: matrix.registry != 'ghcr.io' && matrix.non_ghcr_index == 2
        uses: docker/login-action@v3
        with:
          registry: ${{ matrix.registry }}
          username: ${{ matrix.registry_username || github.actor }}
          password: ${{ secrets.registry_token_2 }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}

      - name: Install crane (pinned)
        run: |
          CRANE_VERSION=v0.21.7
          CRANE_SHA256=1a57bc98207fa1c0d04bf760699099e26f8383499bfd55b99c1b919a928a7230
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" -o crane.tar.gz
          echo "${CRANE_SHA256}  crane.tar.gz" | sha256sum -c
          tar xzf crane.tar.gz crane
          sudo mv crane /usr/local/bin/

      - name: Copy image from GHCR (same digest) and apply tags
        id: push
        run: |
          src="${{ matrix.source_image }}:${{ github.sha }}"
          dst="${{ matrix.image }}:${{ github.sha }}"
          if [ "$src" != "$dst" ]; then
            crane copy "$src" "$dst"
          fi
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            crane tag "$dst" "${ref##*:}"
          done <<< "${{ steps.meta.outputs.tags }}"
          echo "digest=$(crane digest "$dst")" >> "$GITHUB_OUTPUT"

      - name: Save image data
        run: |
          mkdir -p /tmp/image-data
          jq -nc '{
            "name": "${{ matrix.image }}",
            "digest": "${{ steps.push.outputs.digest }}",
            "ref_name": "${{ github.ref_name }}",
            "registry": "${{ matrix.registry }}",
            "push_id": "${{ matrix.push_id }}"
          }' > /tmp/image-data/${{ matrix.push_id }}.json

      - name: Upload image data artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-data-${{ matrix.push_id }}
          path: /tmp/image-data/${{ matrix.push_id }}.json
          retention-days: 1

  update-manifest:
    runs-on: ubuntu-latest
    needs: [define-matrix, push]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.manifest_matrix) }}
    steps:
      - name: Download all image data
        uses: actions/download-artifact@v4
        with:
          path: /tmp/image-data
          pattern: image-data-*
          merge-multiple: true

      - name: Process images for this registry
        id: aggregate
        run: |
          registry="${{ matrix.registry }}"
          images=$(jq -sc "[.[] | select(.registry == \"$registry\")]" /tmp/image-data/*.json)
          echo "images=$images" >> $GITHUB_OUTPUT
          echo "Images for $registry: $images"

      - name: Set branch name
        id: set-branch
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "branch=prod" >> $GITHUB_OUTPUT
            echo "branch=prod"
          fi
          if [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            echo "branch=dev" >> $GITHUB_OUTPUT
            echo "branch=dev"
          fi
          if [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "branch=dev" >> $GITHUB_OUTPUT
            echo "branch=dev (src:develop => dst:dev)"
          fi
          if [[ "${{ github.ref }}" == refs/heads/test ]]; then
            echo "branch=test" >> $GITHUB_OUTPUT
            echo "branch=test"
          fi
          if [[ "${{ github.ref }}" == refs/heads/stage ]]; then
            echo "branch=stage" >> $GITHUB_OUTPUT
            echo "branch=stage"
          fi

      - name: Deploy application
        if: steps.set-branch.outputs.branch != ''
        run: |
          payload=$(cat <<EOF
          {
            "event_type": "update-manifest",
            "client_payload": {
              "repo_name": "${{ env.CD_REPO }}",
              "repo_org": "${{ env.CD_ORG }}",
              "branch": "${{ steps.set-branch.outputs.branch }}",
              "images": ${{ steps.aggregate.outputs.images }},
              "create_pull_request": ${{ env.CREATE_PULL_REQUEST }},
              "helm_chart_name": "${{ inputs.helm_chart_name }}",
              "helm_chart_version": "${{ inputs.helm_chart_version }}",
              "triggered_by": "${{ github.actor }}",
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}"
            }
          }
          EOF
          ) && \
          echo "Deploying to ${{ matrix.argo_repository }}" && \
          echo "Payload: $payload" && \
          curl --fail -X POST \
          -H "Authorization: Bearer ${{ secrets.token }}" \
          https://api.github.com/repos/${{ matrix.argo_repository }}/dispatches \
          -d "$payload"
